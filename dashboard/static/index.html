<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HydroSense â€” Water Leak Detection Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
             gray: {
                950: '#0d1117',
                900: '#161b22',
                800: '#21262d',
                700: '#30363d',
                600: '#484f58',
                400: '#8b949e',
                300: '#c9d1d9',
                100: '#f0f6fc',
             },
             blue: {
                500: '#2f81f7',
                600: '#1f6feb',
             },
             green: {
                400: '#3fb950',
                500: '#238636',
             },
             red: {
                400: '#ff7b72',
                500: '#da3633',
             },
             amber: {
                400: '#d29922',
                500: '#9e6a03',
             }
          }
        },
      }
    }
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #30363d; border-radius: 3px; }
    /* Leaflet overrides */
    .leaflet-container { background: #0d1117; font-family: 'Inter', sans-serif; z-index: 10; }
    .leaflet-popup-content-wrapper { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; }
    .leaflet-popup-tip { background: #161b22; border: 1px solid #30363d; }
    
    .map-marker { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #0d1117; box-shadow: 0 0 4px rgba(0,0,0,0.5); }
    .map-marker.online { background-color: #3fb950; }
    .map-marker.offline { background-color: #484f58; }
    .map-marker.warning { background-color: #d29922; }
    .map-marker.leak { background-color: #ff7b72; box-shadow: 0 0 8px #ff7b72; animation: plsr 1.5s infinite; }

    @keyframes plsr {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 123, 114, 0.7); }
      70% { transform: scale(1.1); box-shadow: 0 0 0 6px rgba(255, 123, 114, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 123, 114, 0); }
    }
  </style>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="h-screen overflow-hidden flex flex-col">
  <div id="root" class="h-full w-full flex flex-col"></div>
  
  <script type="text/babel" src="/static/app.jsx"></script>
</body>
</html>
